name: Generate Clients

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      REPO_NAME: slo-openapi-client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.1'
      - name: Generate Client
        uses: grafana/shared-workflows/actions/generate-openapi-clients@8ef55db5803bf7fc92e32ca4a4f488657f3f53fe # v1.1.0
        with:
          package-name: slo
          spec-path: openapi.yaml
          commit-changes: "false"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          sign-commits: true
          commit-message: "Update generated OpenAPI clients"
          title: "Update OpenAPI clients"
          body: "Auto-generated client update after OpenAPI spec change."
          branch: auto/update-openapi-clients